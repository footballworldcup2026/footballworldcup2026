<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ljub World Cup Sweepstake 2026</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>🏆 Ljub World Cup Sweepstake 2026</h1>
    <p id="lastUpdated">Loading...</p>
  </header>

  <main>
    <section class="card">
      <h2>📊 Leaderboard</h2>
      <div id="leaderboard">Loading leaderboard...</div>
    </section>

    <section class="card">
      <h2>💰 Prize Pool: <span id="totalPrize">Calculating...</span></h2>
      <ul style="list-style: none; padding: 0; margin: 0; font-size: 14px; opacity: 0.9; line-height: 2;">
        <li>🥇 <b>Winner:</b> <span id="prizeWinner">...</span></li>
        <li>🥈 <b>Runner-up:</b> <span id="prizeRunnerUp">...</span></li>
        <li>🥉 <b>Semi-finalists:</b> <span id="prizeSemi">...</span></li>
        <li>🥄 <b>Last Place:</b> <span id="prizeLast">...</span></li>
      </ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
